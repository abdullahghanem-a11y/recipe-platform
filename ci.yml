name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: recipe_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run import checks
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/recipe_platform_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-key
          HUGGINGFACE_API_KEY: ""
        run: |
          python -c "
          from app.core.config import settings
          from app.core.database import Base, engine
          from app.models.user import User
          from app.models.recipe import Recipe
          from app.models.community import Rating, Collection, SavedRecipe, InferenceLog, ApiKey
          from app.schemas.user import UserRegister, UserOut
          from app.schemas.recipe import RecipeCreate, RecipeOut
          from app.routers import auth, users, recipes, collections, ai
          from app.main import app
          print('All imports OK')
          "

      - name: Validate schema rules
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/recipe_platform_test
          REDIS_URL: redis://localhost:6379
          SECRET_KEY: ci-test-secret-key
          HUGGINGFACE_API_KEY: ""
        run: |
          python -c "
          from app.schemas.recipe import RecipeCreate
          import sys

          # title required
          try:
              RecipeCreate(title='   ')
              print('FAIL: empty title should be rejected')
              sys.exit(1)
          except Exception:
              print('PASS: empty title rejected')

          # max 30 steps
          try:
              RecipeCreate(title='Test', steps=[f'Step {i}' for i in range(31)])
              print('FAIL: 31 steps should be rejected')
              sys.exit(1)
          except Exception:
              print('PASS: 31 steps rejected')

          # max 20 ingredients
          try:
              from app.schemas.recipe import Ingredient
              RecipeCreate(title='Test', ingredients=[Ingredient(name=f'ing{i}', quantity='1') for i in range(21)])
              print('FAIL: 21 ingredients should be rejected')
              sys.exit(1)
          except Exception:
              print('PASS: 21 ingredients rejected')

          # negative prep time
          try:
              RecipeCreate(title='Test', prep_time_minutes=-1)
              print('FAIL: negative time should be rejected')
              sys.exit(1)
          except Exception:
              print('PASS: negative time rejected')

          print('All schema validation tests passed')
          "

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t recipe-platform-api .

      - name: Verify image runs
        run: |
          docker run --rm \
            -e DATABASE_URL=postgresql+asyncpg://postgres:password@localhost/test \
            -e REDIS_URL=redis://localhost:6379 \
            -e SECRET_KEY=test-secret \
            recipe-platform-api \
            python -c "from app.main import app; print('App loads OK')"