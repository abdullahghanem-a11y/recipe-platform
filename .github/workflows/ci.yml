name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: recipe_platform_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:password@localhost:5432/recipe_platform_test
      REDIS_URL: redis://localhost:6379
      SECRET_KEY: ci-test-secret-key-do-not-use-in-production
      HUGGINGFACE_API_KEY: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install --extra-index-url https://download.pytorch.org/whl/cpu -r requirements.txt

      - name: Run Alembic migrations
        run: python -m alembic upgrade head

      - name: Run import checks
        run: |
          python -c "
          from app.core.config import settings
          from app.core.database import Base, engine
          from app.models.user import User
          from app.models.recipe import Recipe
          from app.models.community import Rating, Collection, SavedRecipe, Comment, InferenceLog, ApiKey
          from app.schemas.user import UserRegister, UserOut
          from app.schemas.recipe import RecipeCreate, RecipeOut, CommentCreate, CommentOut
          from app.routers import auth, users, recipes, collections, ai
          from app.main import app
          print('All imports OK')
          "

      - name: Run schema validation
        run: |
          python -c "
          from app.schemas.recipe import RecipeCreate, Ingredient, CommentCreate
          import sys

          tests = [
              ('empty title', lambda: RecipeCreate(title='   ')),
              ('31 steps', lambda: RecipeCreate(title='T', steps=[f'Step {i}' for i in range(31)])),
              ('21 ingredients', lambda: RecipeCreate(title='T', ingredients=[Ingredient(name=f'i{i}', quantity='1') for i in range(21)])),
              ('negative prep time', lambda: RecipeCreate(title='T', prep_time_minutes=-1)),
              ('empty comment', lambda: CommentCreate(body='   ')),
          ]

          for name, fn in tests:
              try:
                  fn()
                  print(f'FAIL: {name} should be rejected')
                  sys.exit(1)
              except Exception:
                  print(f'PASS: {name} rejected')

          print('All schema validation tests passed')
          "

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t recipe-platform-api .

      - name: Verify image loads
        run: |
          docker run --rm \
            -e DATABASE_URL=postgresql+asyncpg://postgres:password@localhost/test \
            -e REDIS_URL=redis://localhost:6379 \
            -e SECRET_KEY=test-secret \
            recipe-platform-api \
            python -c "from app.main import app; print('App loads OK')"